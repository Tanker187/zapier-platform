name: Publish

on:
  pull_request:
    types: [closed]
    branches:
      - 'main'

permissions:
  contents: read

jobs:
  publish:
    name: Publish to npm
    if: (github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release-'))
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write  # Required for OIDC trusted publishing

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install pnpm
        uses: step-security/action-setup@3d419c73e38e670dbffe349ffff26dd13c164640 # v4.2.0
        with:
          version: 10.24.0
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install

      - name: Publish zapier-platform-schema
        run: |
          PUBLISHED_VERSION=$(pnpm view zapier-platform-schema version)
          LOCAL_VERSION=$(node -p "require('./package.json').version")

          if [ "$PUBLISHED_VERSION" != "$LOCAL_VERSION" ]; then
            echo "Publishing zapier-platform-schema"
            pnpm publish --provenance --no-git-checks
          else
            echo "Skipping zapier-platform-schema (already published)"
          fi
        working-directory: packages/schema

      - name: Publish zapier-platform-core
        run: |
          PUBLISHED_VERSION=$(pnpm view zapier-platform-core version)
          LOCAL_VERSION=$(node -p "require('./package.json').version")

          if [ "$PUBLISHED_VERSION" != "$LOCAL_VERSION" ]; then
            echo "Publishing zapier-platform-core"
            pnpm publish --provenance --no-git-checks
          else
            echo "Skipping zapier-platform-core (already published)"
          fi
        working-directory: packages/core

      - name: Publish zapier-platform-cli
        run: |
          PUBLISHED_VERSION=$(pnpm view zapier-platform-cli version)
          LOCAL_VERSION=$(node -p "require('./package.json').version")

          if [ "$PUBLISHED_VERSION" != "$LOCAL_VERSION" ]; then
            echo "Publishing zapier-platform-cli"
            pnpm publish --provenance --no-git-checks
          else
            echo "Skipping zapier-platform-cli (already published)"
          fi
        working-directory: packages/cli

      - name: Publish zapier-platform-legacy-scripting-runner
        run: |
          PUBLISHED_VERSION=$(pnpm view zapier-platform-legacy-scripting-runner version)
          LOCAL_VERSION=$(node -p "require('./package.json').version")

          if [ "$PUBLISHED_VERSION" != "$LOCAL_VERSION" ]; then
            echo "Publishing zapier-platform-legacy-scripting-runner"
            pnpm publish --provenance --no-git-checks
          else
            echo "Skipping zapier-platform-legacy-scripting-runner (already published)"
          fi
        working-directory: packages/legacy-scripting-runner

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: arn:aws:iam::996097627176:role/zapier-platform-github-actions-production
          aws-region: us-east-1

      - name: Build and upload boilerplate zip
        run: |
          CORE_VERSION=$(jq -r '.version' packages/core/package.json)
          if aws s3 ls "s3://zapier-dev-platform-cli-boilerplates/$CORE_VERSION.zip" 2>/dev/null; then
            echo "Skipping boilerplate (already uploaded)"
          else
            echo "Building and uploading boilerplate"
            cd boilerplate
            ./scripts/build.sh
            aws s3 cp "build/$CORE_VERSION.zip" "s3://zapier-dev-platform-cli-boilerplates/$CORE_VERSION.zip"
          fi
